version: 1
purpose: pami_robustness_study
project_extension: true
backends:
  - linear_residual
  - rf_residual
  - extra_trees_residual
sample_fractions:
  - 0.5
  - 0.75
  - 1.0
metric:
  max_lag_ami: 60
  max_lag_pami: 40
  n_neighbors: 8
  n_surrogates: 99
  alpha: 0.05
  random_state: 42
stability:
  rank_stability_threshold: 0.8
  directness_stability_threshold: 0.15
  min_series_length: 100

[project]
name = "forecastability"
version = "0.1.0"
description = "AMI + pAMI forecastability analysis framework"
readme = "README.md"
requires-python = ">=3.11,<3.13"
dependencies = [
  "matplotlib==3.10.8",
  "numpy==2.4.3",
  "pandas==3.0.1",
  "scikit-learn>=1.5",
  "scipy>=1.13",
  "statsmodels>=0.14",
  "pyyaml>=6.0",
  "yfinance>=0.2",
  "pydantic>=2.12.5",
]

[dependency-groups]
dev = [
  "pytest>=8.4.0",
  "ruff>=0.11.0",
  "ty==0.0.22",
]
notebook = [
  "jupyter>=1.1.1",
  "jupyterlab>=4.3.5",
  "ipykernel>=6.29.5",
  "nbformat>=5.10.4",
  "nbconvert>=7.16.4",
  "ipywidgets>=8.1.5",
]

[build-system]
requires = ["hatchling>=1.27.0"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/forecastability"]

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "B", "UP"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"

[tool.pytest.ini_options]
addopts = "-q"
testpaths = ["tests"]

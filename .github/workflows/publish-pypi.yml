name: Publish to PyPI

on:
  push:
    tags:
      - "v*"

concurrency:
  group: publish-pypi-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  build-dist:
    name: Verify and build distribution artifacts
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@v7

      - name: Sync development dependencies
        run: |
          set -euo pipefail
          uv sync --dev --all-extras

      - name: Lint with ruff
        run: uv run ruff check .

      - name: Type check with ty
        run: uv run ty check

      - name: Run test suite
        run: uv run pytest -q -ra -n auto

      - name: Build package artifacts
        run: uv build

      - name: Validate artifacts
        run: uv run twine check dist/*

      - name: Wheel smoke test (stable facades)
        shell: bash
        run: |
          set -euo pipefail
          wheel_path=$(ls dist/*.whl | head -1)
          python -m venv /tmp/smoke-venv
          /tmp/smoke-venv/bin/pip install --quiet "${wheel_path}[causal]"
          /tmp/smoke-venv/bin/python - <<'PY'
          import numpy as np

          from forecastability import run_covariant_analysis, run_lag_aware_mod_mrmr
          from forecastability.triage import LagAwareModMRMRConfig, PairwiseScorerSpec

          target = np.tile(np.array([0.0, 1.0]), 16)
          covariate = np.concatenate([target[1:], target[-1:]])
          spec = PairwiseScorerSpec(
            name="pearson_abs",
            backend="scipy",
            normalization="none",
            significance_method="none",
          )
          config = LagAwareModMRMRConfig(
            forecast_horizon=1,
            availability_margin=0,
            candidate_lags=[1],
            relevance_scorer=spec,
            redundancy_scorer=spec,
            max_selected_features=1,
          )
          result = run_lag_aware_mod_mrmr(
            target=target,
            covariates={"driver": covariate},
            config=config,
          )

          assert callable(run_covariant_analysis)
          assert len(result.selected) == 1
          assert result.selected[0].feature_name == "x_driver_lag1"
          print("wheel smoke test: stable facades OK")
          PY

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v7
        with:
          name: pypi-dist-artifacts
          path: dist/*
          if-no-files-found: error

  publish-pypi:
    name: Publish to PyPI (trusted publishing)
    runs-on: ubuntu-latest
    needs: build-dist
    environment:
      name: pypi
      url: https://pypi.org/p/dependence-forecastability
    permissions:
      id-token: write
    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@v8
        with:
          name: pypi-dist-artifacts
          path: dist

      - name: Publish distribution artifacts to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  verify-published-release:
    name: Verify published release
    runs-on: ubuntu-latest
    needs: publish-pypi
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@v7

      - name: Sync development dependencies
        run: |
          set -euo pipefail
          uv sync --dev --all-extras

      - name: Verify post-publish surfaces
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPOSITORY: ${{ github.repository }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          uv run python scripts/check_published_release.py \
            --repository "${REPOSITORY}" \
            --tag "${TAG_NAME}" \
            --skip-github-release

  notify-sibling:
    # EX-CPL-01 — Fire repository_dispatch to the sibling examples repo so
    # its notebook matrix runs against the newly published PyPI artifact.
    # Requires a PAT stored as EXAMPLES_DISPATCH_TOKEN with scope:
    #   contents:write on AdamKrysztopa/forecastability-examples
    name: Notify sibling repo (EX-CPL-01)
    runs-on: ubuntu-latest
    needs: verify-published-release
    permissions:
      contents: read
    steps:
      - name: Dispatch core_release event to forecastability-examples
        env:
          DISPATCH_TOKEN: ${{ secrets.EXAMPLES_DISPATCH_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          if [ -z "${DISPATCH_TOKEN}" ]; then
            echo "EXAMPLES_DISPATCH_TOKEN not set — skipping sibling dispatch (set the secret to enable)."
            exit 0
          fi
          VERSION="${TAG_NAME#v}"
          curl --fail --silent --show-error \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${DISPATCH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/AdamKrysztopa/forecastability-examples/dispatches" \
            -d "{\"event_type\":\"core_release\",\"client_payload\":{\"version\":\"${VERSION}\",\"tag\":\"${TAG_NAME}\",\"pypi_url\":\"https://pypi.org/project/dependence-forecastability/${VERSION}/\"}}"

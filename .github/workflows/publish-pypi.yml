name: Publish to PyPI

on:
  push:
    tags:
      - "v*"

concurrency:
  group: publish-pypi-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  build-dist:
    name: Verify and build distribution artifacts
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@v6

      - name: Sync development dependencies
        run: |
          set -euo pipefail
          uv sync --dev --all-extras

      - name: Lint with ruff
        run: uv run ruff check .

      - name: Type check with ty
        run: uv run ty check

      - name: Run test suite
        run: uv run pytest -q -ra

      - name: Build package artifacts
        run: uv build

      - name: Validate artifacts
        run: uv run twine check dist/*

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v7
        with:
          name: pypi-dist-artifacts
          path: dist/*
          if-no-files-found: error

  publish-pypi:
    name: Publish to PyPI (trusted publishing)
    runs-on: ubuntu-latest
    needs: build-dist
    environment:
      name: pypi
      url: https://pypi.org/p/dependence-forecastability
    permissions:
      id-token: write
    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@v4
        with:
          name: pypi-dist-artifacts
          path: dist

      - name: Publish distribution artifacts to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
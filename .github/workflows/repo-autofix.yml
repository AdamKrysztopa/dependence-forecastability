name: Repository Autofix

on:
  workflow_dispatch:
  schedule:
    - cron: "0 7 * * 1"

concurrency:
  group: repo-autofix-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

jobs:
  sync-and-pr:
    name: Sync repository contract and open PR
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@v7

      - name: Sync development dependencies
        run: |
          set -euo pipefail
          uv sync --dev --all-extras

      - name: Apply repository contract sync
        run: |
          set -euo pipefail
          uv run python scripts/sync_repo_contract.py --write

      - name: Create pull request for autofix changes
        uses: peter-evans/create-pull-request@v7
        with:
          title: chore: sync repository contract and documentation links
          body: |
            Automated repository-contract sync.

            This PR includes deterministic rewrites from:
            - `uv run python scripts/sync_repo_contract.py --write`

            Please review scope and merge if checks pass.
          branch: chore/repo-contract-autofix
          delete-branch: true
          commit-message: "chore: sync repository contract and documentation links"
          labels: |
            automation
            repository-contract

name: Release

on:
  push:
    tags:
      - "v*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-dist:
    name: Build distribution artifacts
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate tag, package version, and release notes
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          V_pkg="$(awk -F'"' '/^version = "/ { print $2; exit }' pyproject.toml)"
          if [ -z "${V_pkg}" ]; then
            echo "Could not parse version from pyproject.toml"
            exit 1
          fi
          expected_tag="v${V_pkg}"
          if [ "${REF_NAME}" != "${expected_tag}" ]; then
            echo "Tag/version mismatch: ref '${REF_NAME}' != expected '${expected_tag}'"
            exit 1
          fi
          notes_file="docs/releases/${expected_tag}.md"
          if [ ! -f "${notes_file}" ]; then
            echo "Missing release notes file: ${notes_file}"
            exit 1
          fi

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@v7

      - name: Install dependencies
        run: |
          set -euo pipefail
          uv sync --dev --all-extras

      - name: Covariant import sanity check
        run: |
          set -euo pipefail
          uv run python -c "from forecastability.use_cases.run_covariant_analysis import run_covariant_analysis; print('covariant import OK')"

      - name: Release-tag repo contract check
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          uv run python scripts/check_repo_contract.py --release-tag "${RELEASE_TAG}"

      - name: Build package artifacts
        run: uv build

      - name: Validate artifacts
        run: uv run twine check dist/*

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist-artifacts
          path: dist/*
          if-no-files-found: error

  publish-release:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs: build-dist
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download dist artifacts
        uses: actions/download-artifact@v8
        with:
          name: dist-artifacts
          path: dist

      - name: Create or update release from tag
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          notes_file="docs/releases/${TAG_NAME}.md"

          if gh release view "${TAG_NAME}" >/dev/null 2>&1; then
            if [ -f "${notes_file}" ]; then
              gh release edit "${TAG_NAME}" --notes-file "${notes_file}"
            fi
            gh release upload "${TAG_NAME}" dist/* --clobber
            exit 0
          fi

          if [ -f "${notes_file}" ]; then
            gh release create "${TAG_NAME}" dist/* --title "${TAG_NAME}" --notes-file "${notes_file}"
          else
            gh release create "${TAG_NAME}" dist/* --title "${TAG_NAME}" --generate-notes
          fi

name: Release

on:
  push:
    tags:
      - "v*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-dist:
    name: Build distribution artifacts
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate tag, package version, and release notes
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          V_pkg="$(awk -F'"' '/^version = "/ { print $2; exit }' pyproject.toml)"
          if [ -z "${V_pkg}" ]; then
            echo "Could not parse version from pyproject.toml"
            exit 1
          fi
          expected_tag="v${V_pkg}"
          if [ "${REF_NAME}" != "${expected_tag}" ]; then
            echo "Tag/version mismatch: ref '${REF_NAME}' != expected '${expected_tag}'"
            exit 1
          fi
          notes_file="docs/releases/${expected_tag}.md"
          if [ ! -f "${notes_file}" ]; then
            echo "Missing release notes file: ${notes_file}"
            exit 1
          fi

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@v7

      - name: Install dependencies
        run: |
          set -euo pipefail
          uv sync --dev --all-extras

      - name: Covariant import sanity check
        run: |
          set -euo pipefail
          uv run python -c "from forecastability.use_cases.run_covariant_analysis import run_covariant_analysis; print('covariant import OK')"

      - name: Release-tag repo contract check
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          uv run python scripts/check_repo_contract.py --release-tag "${RELEASE_TAG}"

      - name: Build package artifacts
        run: uv build

      - name: Validate artifacts
        run: uv run twine check dist/*

      - name: Wheel smoke test (stable facades)
        shell: bash
        run: |
          set -euo pipefail
          wheel_path=$(ls dist/*.whl | head -1)
          python -m venv /tmp/release-wheel-smoke
          /tmp/release-wheel-smoke/bin/pip install --quiet "${wheel_path}[causal]"
          /tmp/release-wheel-smoke/bin/python - <<'PY'
          import numpy as np

          from forecastability import run_covariant_analysis, run_lag_aware_mod_mrmr
          from forecastability.triage import LagAwareModMRMRConfig, PairwiseScorerSpec

          target = np.tile(np.array([0.0, 1.0]), 16)
          covariate = np.concatenate([target[1:], target[-1:]])
          spec = PairwiseScorerSpec(
              name="pearson_abs",
              backend="scipy",
              normalization="none",
              significance_method="none",
          )
          config = LagAwareModMRMRConfig(
              forecast_horizon=1,
              availability_margin=0,
              candidate_lags=[1],
              relevance_scorer=spec,
              redundancy_scorer=spec,
              max_selected_features=1,
          )
          result = run_lag_aware_mod_mrmr(
              target=target,
              covariates={"driver": covariate},
              config=config,
          )

          assert callable(run_covariant_analysis)
          assert len(result.selected) == 1
          assert result.selected[0].feature_name == "x_driver_lag1"
          print("wheel smoke test: stable facades OK")
          PY

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist-artifacts
          path: dist/*
          if-no-files-found: error

  publish-release:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs: build-dist
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download dist artifacts
        uses: actions/download-artifact@v8
        with:
          name: dist-artifacts
          path: dist

      - name: Create or update release from tag
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          notes_file="docs/releases/${TAG_NAME}.md"

          if gh release view "${TAG_NAME}" >/dev/null 2>&1; then
            if [ -f "${notes_file}" ]; then
              gh release edit "${TAG_NAME}" --notes-file "${notes_file}"
            fi
            gh release upload "${TAG_NAME}" dist/* --clobber
            exit 0
          fi

          if [ -f "${notes_file}" ]; then
            gh release create "${TAG_NAME}" dist/* --title "${TAG_NAME}" --notes-file "${notes_file}"
          else
            gh release create "${TAG_NAME}" dist/* --title "${TAG_NAME}" --generate-notes
          fi

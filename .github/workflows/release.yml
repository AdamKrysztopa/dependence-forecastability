name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-dist:
    name: Build distribution artifacts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build package artifacts
        run: |
          python -m pip install --upgrade pip
          python -m pip install build
          python -m build

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-artifacts
          path: dist/*
          if-no-files-found: error

  publish-release:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs: build-dist
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download dist artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist-artifacts
          path: dist

      - name: Create or update release from tag
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          notes_file="docs/releases/${TAG_NAME}.md"

          if gh release view "${TAG_NAME}" >/dev/null 2>&1; then
            if [ -f "${notes_file}" ]; then
              gh release edit "${TAG_NAME}" --notes-file "${notes_file}"
            fi
            gh release upload "${TAG_NAME}" dist/* --clobber
            exit 0
          fi

          if [ -f "${notes_file}" ]; then
            gh release create "${TAG_NAME}" dist/* --title "${TAG_NAME}" --notes-file "${notes_file}"
          else
            gh release create "${TAG_NAME}" dist/* --title "${TAG_NAME}" --generate-notes
          fi

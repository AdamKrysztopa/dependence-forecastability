name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality:
    name: Lint, type-check, test, and build (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up uv
        uses: astral-sh/setup-uv@v7

      - name: Sync development dependencies
        run: |
          set -euo pipefail
          uv sync --dev --all-extras

      - name: Lint with ruff
        run: uv run ruff check .

      - name: Lint markdown with markdownlint-cli2
        run: npx --yes markdownlint-cli2 "docs/**/*.md" README.md CHANGELOG.md llms.txt

      - name: Type check with ty
        run: uv run ty check

      - name: Run test suite
        run: uv run pytest -q -ra -n auto

      - name: Build package artifacts
        run: uv build

      - name: Upload CI artifacts
        uses: actions/upload-artifact@v7
        with:
          name: ci-artifacts-py${{ matrix.python-version }}
          path: |
            outputs/figures/
            outputs/json/
            outputs/tables/
          if-no-files-found: ignore

  docs-contract:
    name: Docs contract checks
    runs-on: ubuntu-latest
    needs: []
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v7

      - name: Sync development dependencies
        run: uv sync --dev --all-extras

      - name: Import contract check
        run: uv run python scripts/check_docs_contract.py --import-contract

      - name: Version coherence check
        run: uv run python scripts/check_docs_contract.py --version-coherence

      - name: Terminology check
        run: uv run python scripts/check_docs_contract.py --terminology

      - name: Plan lifecycle check
        run: uv run python scripts/check_docs_contract.py --plan-lifecycle

      - name: No-framework-imports check
        run: uv run python scripts/check_docs_contract.py --no-framework-imports

      - name: Root-path-pinned check
        run: uv run python scripts/check_docs_contract.py --root-path-pinned

  docs-links:
    name: Link check (lychee offline)
    runs-on: ubuntu-latest
    needs: []
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Link check
        uses: lycheeverse/lychee-action@v2
        with:
          args: --offline --config lychee.toml "docs/**/*.md" README.md CHANGELOG.md llms.txt
          fail: true
